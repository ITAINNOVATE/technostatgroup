<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="softBlur">
            <feGaussianBlur stdDeviation="0.5" />
        </filter>
        <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:rgb(240,248,255);stop-opacity:0" />
            <stop offset="100%" style="stop-color:rgb(255,255,255);stop-opacity:1" />
        </radialGradient>
    </defs>
    
    <!-- Group with low opacity and light blue/grey stroke -->
    <g stroke="#328CC1" stroke-width="1" fill="none" opacity="0.6">
        
        <!-- Randomly distributed nodes and connections for "Data Network" feel -->
        <!-- Use path to create connected mesh -->
        <path d="M100,100 L200,150 L300,50 L500,120 L700,80" />
        <path d="M100,100 L150,300 L200,150" />
        <path d="M200,150 L400,250 L500,120" />
        <path d="M400,250 L600,200 L700,80" />
        <path d="M150,300 L300,450 L400,250" />
        <path d="M300,450 L600,400 L600,200" />
        <path d="M600,400 L750,550 L600,200" />
        <path d="M50,500 L150,300 L300,450" />
        
        <!-- Floating unconnected or semi-connected nodes -->
        <circle cx="100" cy="100" r="3" fill="#BBDEFB" stroke="none" />
        <circle cx="200" cy="150" r="3" fill="#BBDEFB" stroke="none" />
        <circle cx="300" cy="50" r="2" fill="#E1F5FE" stroke="none" />
        <circle cx="500" cy="120" r="3" fill="#BBDEFB" stroke="none" />
        <circle cx="700" cy="80" r="3" fill="#BBDEFB" stroke="none" />
        
        <circle cx="150" cy="300" r="4" fill="#64B5F6" stroke="none" opacity="0.5" />
        <circle cx="400" cy="250" r="4" fill="#64B5F6" stroke="none" opacity="0.5" />
        <circle cx="600" cy="200" r="3" fill="#BBDEFB" stroke="none" />
        
        <circle cx="300" cy="450" r="3" fill="#BBDEFB" stroke="none" />
        <circle cx="600" cy="400" r="3" fill="#BBDEFB" stroke="none" />
        <circle cx="750" cy="550" r="2" fill="#E1F5FE" stroke="none" />
        <circle cx="50" cy="500" r="2" fill="#E1F5FE" stroke="none" />

        <!-- Extra subtle cross-lines -->
        <line x1="100" y1="100" x2="500" y2="120" stroke-opacity="0.3" stroke-dasharray="2,4" />
        <line x1="150" y1="300" x2="600" y2="400" stroke-opacity="0.3" stroke-dasharray="2,4" />
        <line x1="300" y1="50" x2="400" y2="250" stroke-opacity="0.3" stroke-dasharray="2,4" />
    </g>
</svg>
