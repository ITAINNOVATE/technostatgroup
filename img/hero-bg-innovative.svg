<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradients for depth -->
        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#328CC1;stop-opacity:0.2" />
            <stop offset="50%" style="stop-color:#0B3C5D;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color:#328CC1;stop-opacity:0.2" />
        </linearGradient>
        
        <!-- Dot pattern for "Data" -->
        <pattern id="dotPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1" fill="#0B3C5D" opacity="0.1" />
        </pattern>
    </defs>

    <!-- Base Grid / Pattern -->
    <rect width="100%" height="100%" fill="url(#dotPattern)" />

    <!-- Architectural Wireframe / Mesh -->
    <g stroke="url(#lineGrad)" stroke-width="0.7" fill="none" opacity="0.8">
        <!-- Structural Lines -->
        <path d="M 0,100 L 1200,300 M 0,400 L 1200,200 M 0,600 L 1200,700" opacity="0.4" />
        <path d="M 100,0 L 400,800 M 600,0 L 500,800 M 900,0 L 1100,800" opacity="0.4" />

        <!-- Abstract "Nodes" and Geometric Clusters -->
        <path d="M 200,100 L 300,250 L 150,300 Z" stroke-width="1.5" />
        <path d="M 900,500 L 1050,600 L 950,750 Z" stroke-width="1.5" />
        
        <!-- Connection Network -->
        <circle cx="200" cy="100" r="4" fill="#328CC1" opacity="0.5" />
        <circle cx="300" cy="250" r="4" fill="#328CC1" opacity="0.5" />
        <circle cx="150" cy="300" r="4" fill="#328CC1" opacity="0.5" />
        <circle cx="900" cy="500" r="4" fill="#328CC1" opacity="0.5" />
        
        <!-- Large Abstract Swirl/Curvature (representing flow/innovation) -->
        <path d="M -50,150 Q 400,50 800,400 T 1250,300" stroke-width="2" stroke-dasharray="10,10" opacity="0.3" />
        <path d="M -50,650 Q 500,750 900,350 T 1250,550" stroke-width="2" stroke-dasharray="10,10" opacity="0.3" />
    </g>
</svg>
